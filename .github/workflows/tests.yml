name: tests

on:
    push:
        branches:
            - main
    pull_request:
    schedule:
        - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
    tests:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                persist-credentials: false

            - name: Install pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
              with:
                  version: 10

            - name: Install dependencies
              run: pnpm install

            - name: Build
              run: pnpm build

            - name: ESLint
              run: pnpm run lint

            - name: Execute tests
              run: pnpm test
